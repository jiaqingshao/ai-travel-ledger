name: ai_travel_ledger
description: "AI 旅行账本 - 自驾游/团队游场景的智能记账与分摊工具。让多人 AA 结算从 30 分钟缩短到 30 秒。"
version: 1.0.0+0
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ============================================
  # 状态管理
  # ============================================
  flutter_riverpod: ^2.4.9  # ADR-001 选择

  # ============================================
  # 路由
  # ============================================
  go_router: ^13.2.0

  # ============================================
  # 后端 (BaaS) - ADR-002 Supabase
  # ============================================
  supabase_flutter: ^2.5.0

  # ============================================
  # 本地存储
  # ============================================
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.2

  # ============================================
  # 网络
  # ============================================
  http: ^1.2.1
  dio: ^5.4.0  # 备用网络库

  # ============================================
  # 工具
  # ============================================
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0

  # ============================================
  # UI
  # ============================================
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  fl_chart: ^0.66.2  # 图表
  qr_flutter: ^4.1.0  # 二维码（邀请用）

  # ============================================
  # 媒体
  # ============================================
  image_picker: ^1.0.7
  share_plus: ^9.0.0

  # ============================================
  # 国际化（中文优先）
  # ============================================
  chinese_lunar_calendar: ^1.0.5  # 农历（可选）


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

# 依赖覆盖 - 修复 app_links 6.4.1 与 Flutter 3.x 不兼容
# 6.4.1 的 build.gradle 引用了 'flutter' 属性，但当前 Flutter 3.x 移除了这个属性
# 升级到 6.3.x（兼容 Dart 3.3.0+，Flutter 3.19+，对应 3.24.5 完美适配）
# 7.x 系列需要 Dart 3.12+，等升级 Flutter 后再用（ISSUE-2026-07-09-01）
dependency_overrides:
  app_links: 6.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
